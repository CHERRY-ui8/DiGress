# Discrete model defaults for metabolite (smaller backbone to fit memory)
type: 'discrete'
transition: 'marginal'
model: 'graph_tf'
diffusion_steps: 500
diffusion_noise_schedule: 'cosine'

n_layers: 6
extra_features: 'all'

hidden_mlp_dims:
  X: 256
  E: 128
  y: 256
hidden_dims:
  dx: 256
  de: 128
  dy: 256
  n_head: 8
  dim_ffX: 256
  dim_ffE: 128
  dim_ffy: 256

lambda_train: [5, 0]
